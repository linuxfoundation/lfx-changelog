<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LFX Changelog Widget — Local Test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        background: #f5f5f5;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      p {
        color: #666;
        margin-bottom: 24px;
      }
      .section {
        margin-bottom: 40px;
      }
      .section h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }
      hr {
        border: none;
        border-top: 1px solid #ddd;
        margin: 40px 0;
      }
    </style>
  </head>
  <body>
    <h1>LFX Changelog Widget — Test Page</h1>
    <p>Testing the widget against the local dev server. Start with <code>yarn start</code> first.</p>

    <div class="section">
      <h2>Light theme (EasyCLA, limit 3)</h2>
      <lfx-changelog product="easycla" limit="3" base-url="http://localhost:4204"></lfx-changelog>
    </div>

    <hr />

    <div class="section">
      <h2>Dark theme (Insights, limit 5)</h2>
      <lfx-changelog product="insights" theme="dark" limit="5" base-url="http://localhost:4204"></lfx-changelog>
    </div>

    <hr />

    <div class="section">
      <h2>Custom styled (Mentorship)</h2>
      <style>
        #custom-widget {
          --lfx-accent: #10b981;
          --lfx-accent-bg: #ecfdf5;
          --lfx-border-radius: 8px;
        }
        #custom-widget::part(card) {
          border-left: 3px solid var(--lfx-accent);
        }
      </style>
      <lfx-changelog id="custom-widget" product="mentorship" limit="3" base-url="http://localhost:4204"></lfx-changelog>
    </div>

    <hr />

    <div class="section">
      <h2>Error state (invalid product)</h2>
      <lfx-changelog product="does-not-exist" limit="3" base-url="http://localhost:4204"></lfx-changelog>
    </div>

    <script src="./dist/lfx-changelog.umd.cjs"></script>
  </body>
</html>
