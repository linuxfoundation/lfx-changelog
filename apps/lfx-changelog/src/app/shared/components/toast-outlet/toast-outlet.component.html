<div data-testid="toast-container" class="fixed right-6 bottom-6 z-50 flex flex-col gap-2" role="status" aria-live="polite">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      data-testid="toast"
      [attr.data-toast-type]="toast.type"
      class="flex items-center gap-2 rounded-lg border px-4 py-3 text-sm shadow-lg"
      [ngClass]="[toast.type | toastColor, toast.dismissing ? 'animate-slide-out-right' : 'animate-slide-in-right']">
      <i [class]="toast.type | toastIcon"></i>
      <span data-testid="toast-message" class="flex-1">{{ toast.message }}</span>
      <button
        data-testid="toast-dismiss"
        (click)="toastService.dismiss(toast.id)"
        class="ml-2 cursor-pointer opacity-60 transition-opacity hover:opacity-100"
        aria-label="Dismiss">
        <i class="fa-solid fa-xmark text-xs"></i>
      </button>
    </div>
  }
</div>
