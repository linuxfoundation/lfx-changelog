<div class="space-y-4">
  <div class="flex items-start gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-500/10">
      <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
    </div>
    <div>
      <p class="text-text-primary text-sm font-medium">This action cannot be undone</p>
      <p class="text-text-secondary mt-1 text-sm">
        Revoking
        <span class="text-text-primary font-medium">{{ key().name }}</span>
        (<span class="font-mono text-xs">{{ key().keyPrefix }}...</span>) will immediately stop all requests using this key.
      </p>
    </div>
  </div>
  <div class="flex justify-end gap-3 pt-1">
    <lfx-button variant="secondary" (clicked)="dialogService.close()">Cancel</lfx-button>
    <lfx-button data-testid="api-key-revoke-confirm" variant="danger" (clicked)="confirm()">Revoke Key</lfx-button>
  </div>
</div>
