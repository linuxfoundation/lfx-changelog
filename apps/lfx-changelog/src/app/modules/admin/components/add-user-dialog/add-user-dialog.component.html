<div class="space-y-4">
  @if (error(); as errorMsg) {
    <div
      data-testid="add-user-error"
      class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-800 dark:bg-red-950 dark:text-red-300">
      {{ errorMsg }}
    </div>
  }
  <lfx-input data-testid="add-user-email-input" label="Email" [formControl]="emailControl" placeholder="user@example.com" type="email" />
  <lfx-input data-testid="add-user-name-input" label="Name" [formControl]="nameControl" placeholder="Full name" />
  <lfx-select data-testid="add-user-role-select" label="Role" [options]="roleOptions" [formControl]="roleControl" placeholder="Select role..." />
  @if (!isSuperAdmin()) {
    <lfx-select
      data-testid="add-user-product-select"
      label="Products"
      [options]="productOptions()"
      [formControl]="productIdsControl"
      [multiple]="true"
      [searchable]="true"
      placeholder="Select products..." />
  }
  <div class="flex justify-end gap-2 pt-2">
    <lfx-button variant="secondary" size="sm" (clicked)="dialogService.close()">Cancel</lfx-button>
    <lfx-button data-testid="add-user-create-btn" variant="primary" size="sm" (clicked)="create()">Create User</lfx-button>
  </div>
</div>
