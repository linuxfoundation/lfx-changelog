<p class="text-text-secondary text-sm">
  Are you sure you want to disconnect your Slack integration? You will no longer be able to post changelogs to Slack until you reconnect.
</p>
<div class="mt-4 flex justify-end gap-3">
  <lfx-button variant="secondary" (clicked)="dialogService.close()">Cancel</lfx-button>
  <lfx-button variant="primary" [loading]="disconnecting()" (clicked)="confirm()"> Disconnect </lfx-button>
</div>
