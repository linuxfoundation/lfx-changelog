<div class="space-y-4">
  <p class="text-text-secondary text-sm">Select a product to run the changelog agent. The agent will analyze recent activity and generate a draft changelog entry.</p>

  <lfx-select label="Product" [options]="productOptions()" [formControl]="productControl" placeholder="Select a product..." />

  @if (error()) {
    <div
      class="flex items-center gap-2 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-800 dark:bg-red-950/30 dark:text-red-400">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ error() }}
    </div>
  }

  <div class="flex justify-end gap-3">
    <lfx-button variant="secondary" (clicked)="dialogService.close()">Cancel</lfx-button>
    <lfx-button variant="primary" [loading]="triggering()" [disabled]="productControl.invalid" (clicked)="trigger()">
      <i class="fa-duotone fa-robot text-xs"></i>
      Run Agent
    </lfx-button>
  </div>
</div>
