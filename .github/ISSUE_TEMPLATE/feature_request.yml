name: Feature Request
description: Suggest a new feature or enhancement for LFX Changelog
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea in detail so we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is this related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this relate to?
      multiple: true
      options:
        - Public changelog feed
        - Admin dashboard
        - Changelog editor
        - AI chat assistant
        - AI changelog generation
        - GitHub integration
        - Slack integration
        - Search
        - Authentication / Roles
        - API / MCP server
        - UI / Theming
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots about the feature request.
    validations:
      required: false
