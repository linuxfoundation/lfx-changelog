---
# Copyright The Linux Foundation and each contributor to LFX.
# SPDX-License-Identifier: MIT

name: Deploy Branch to Development

on:
  pull_request:
    types: [opened, reopened, closed, labeled, unlabeled, synchronize]

# Coalesce events per PR: rapid pushes cancel any in-flight build so only the
# latest revision is built. A close or unlabel event also cancels in-flight
# builds; build-and-push skips via its `if:` guard on those events, so only
# the cleanup-on-close job runs to tear down the deployment.
concurrency:
  group: docker-build-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Only build a container if the PR is still open, it's labeled with
    # 'deploy-preview' and does not come from a fork.
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.head.repo.fork == false &&
      contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,prefix=changelog-pr-
          labels: |
            org.opencontainers.image.title=LFX Changelog
            org.opencontainers.image.description=Linux Foundation LFX Changelog application
            org.opencontainers.image.vendor=The Linux Foundation
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            com.github.actions.run_id=${{ github.run_id }}
            com.github.actions.run_number=${{ github.run_number }}
            com.github.actions.workflow=${{ github.workflow }}

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=dev

      # Script lives at .github/scripts/comment-deployment-status.js — it
      # was extracted from an inline `script:` block so that ESLint and
      # editors can treat it as first-class JavaScript. See
      # .github/scripts/README.md for the invocation contract.
      - name: Comment deployment URL on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const script = require('./.github/scripts/comment-deployment-status.js');
            await script({ github, context });

  cleanup-on-close:
    # Skip for fork PRs: the GITHUB_TOKEN is read-only on fork events, so the
    # comment and GHCR delete API calls would 403. Build-and-push already
    # excludes forks, so there is nothing to clean up for them anyway.
    if: >
      github.event.pull_request.head.repo.fork == false &&
      (
        (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'deploy-preview')) ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-preview')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      issues: write

    steps:
      # Sparse checkout of just .github/scripts/ — the cleanup job only
      # needs the helper script files, not the full repo. This keeps the
      # cleanup job fast (~2s) while still letting us require() the
      # extracted comment script below.
      - name: Checkout scripts only
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      # Best-effort deletion of the per-PR image tag from GHCR. Without this,
      # `changelog-pr-N` tags accumulate indefinitely and consume registry
      # storage. Failures are logged but do not fail the job, so the PR
      # comment below is always posted.
      - name: Delete PR container image from GHCR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')
          TAG="changelog-pr-${PR_NUMBER}"

          # Detect whether the repo owner is a user or an organization so we
          # call the correct GHCR package API path.
          OWNER_TYPE=$(gh api "users/${OWNER}" --jq '.type' 2>/dev/null || echo "Organization")
          if [ "$OWNER_TYPE" = "Organization" ]; then
            API_BASE="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            API_BASE="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          echo "Searching GHCR for versions tagged '${TAG}'..."
          VERSION_IDS=$(gh api --paginate "${API_BASE}" \
            --jq "[.[] | select(.metadata.container.tags[]? == \"${TAG}\") | .id] | .[]" || echo "")

          if [ -z "$VERSION_IDS" ]; then
            echo "No GHCR versions found for tag '${TAG}'. Nothing to delete."
            exit 0
          fi

          while IFS= read -r VERSION_ID; do
            [ -z "$VERSION_ID" ] && continue
            echo "Deleting GHCR version ${VERSION_ID} (tag: ${TAG})"
            gh api -X DELETE "${API_BASE}/${VERSION_ID}" \
              || echo "Warning: failed to delete version ${VERSION_ID}"
          done <<< "$VERSION_IDS"

      # Script lives at .github/scripts/comment-deployment-removed.js.
      - name: Comment removal on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const script = require('./.github/scripts/comment-deployment-removed.js');
            await script({ github, context });
