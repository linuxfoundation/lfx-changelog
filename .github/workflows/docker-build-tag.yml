---
# Copyright The Linux Foundation and each contributor to LFX.
# SPDX-License-Identifier: MIT

name: Docker Build - Release

on:
  push:
    tags:
      - v*

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COSIGN_VERSION: v2.5.3
  HELM_VERSION: v3.18.4
  YQ_VERSION: v4.53.2
  YQ_SHA256: d56bf5c6819e8e696340c312bd70f849dc1678a7cda9c2ad63eebd906371d56b

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # required for cosign keyless signing of the image
    outputs:
      app_version: ${{ steps.prepare.outputs.app_version }}
      chart_name: ${{ steps.prepare.outputs.chart_name }}
      chart_version: ${{ steps.prepare.outputs.chart_version }}
      image_name: ${{ steps.image-info.outputs.image_name }}
      image_digest: ${{ steps.docker-build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # The mikefarah/yq binary is preinstalled on GitHub-hosted ubuntu-latest
      # runners, but that is undocumented behavior and not part of the runner
      # image contract — it could be removed in a future image without warning.
      # We also can't fall back to `apt-get install yq`, since Ubuntu's apt
      # repos ship a different tool (Python-based kislyuk/yq) with incompatible
      # syntax, which would silently change the meaning of the yq calls below.
      # Installing the pinned mikefarah/yq release directly guarantees the
      # correct tool, a reproducible version, and works on self-hosted runners.
      - name: Install yq
        run: |
          set -euo pipefail
          YQ_BINARY="yq_linux_amd64"
          YQ_URL="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${YQ_BINARY}"
          curl -fsSL "$YQ_URL" -o /tmp/yq
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum -c -
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq
          rm -f /tmp/yq
          yq --version

      - name: Prepare versions and chart name
        id: prepare
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$REF_NAME' is not a valid SemVer (expected vX.Y.Z[-pre][+build])" >&2
            exit 1
          fi
          CHART_NAME="$(yq '.name' charts/*/Chart.yaml)"
          {
            echo "app_version=$VERSION"
            echo "chart_name=$CHART_NAME"
            echo "chart_version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=LFX Changelog
            org.opencontainers.image.description=Linux Foundation LFX Changelog application
            org.opencontainers.image.vendor=The Linux Foundation
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            com.github.actions.run_id=${{ github.run_id }}
            com.github.actions.run_number=${{ github.run_number }}
            com.github.actions.workflow=${{ github.workflow }}

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Emit SLSA build provenance and an SPDX SBOM as in-toto
          # attestations alongside the image. These help downstream consumers
          # verify how the image was built and inspect its dependencies.
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_ENV=prod

      # Lowercase the image reference because GHCR requires lowercase repo
      # paths, but ${{ github.repository }} preserves the original case.
      - name: Compute lowercase image reference
        id: image-info
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          IMAGE_REF=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: "${{ env.COSIGN_VERSION }}"

      # Sign the container image with keyless cosign so that consumers can
      # verify provenance using `cosign verify --certificate-identity-regexp
      # 'https://github.com/${{ github.repository }}/.github/workflows/.+'`.
      - name: Sign the container image in GHCR
        env:
          IMAGE: ${{ steps.image-info.outputs.image_name }}
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

  release-helm-chart:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.publish-ghcr.outputs.digest }}
      image_name: ${{ steps.publish-ghcr.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Publish Chart to GHCR
        id: publish-ghcr
        uses: linuxfoundation/lfx-public-workflows/.github/actions/helm-chart-oci-publisher@c465d6571fa0b8be9d551d902955164ea04a00af # main
        with:
          name: ${{ needs.build-and-push.outputs.chart_name }}
          repository: ${{ github.repository }}/chart
          chart_version: ${{ needs.build-and-push.outputs.chart_version }}
          app_version: ${{ needs.build-and-push.outputs.app_version }}
          registry: ghcr.io
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "${{ env.COSIGN_VERSION }}"

      - name: Login to GitHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign the Helm chart in GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_IMAGE: ${{ steps.publish-ghcr.outputs.image_name }}
          COSIGN_DIGEST: ${{ steps.publish-ghcr.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${COSIGN_IMAGE}@${COSIGN_DIGEST}"

  create-ghcr-helm-provenance:
    needs:
      - release-helm-chart
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.release-helm-chart.outputs.image_name }}
      digest: ${{ needs.release-helm-chart.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
