---
# Copyright The Linux Foundation and each contributor to LFX.
# SPDX-License-Identifier: MIT

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-headers:
    runs-on: ubuntu-latest
    name: Check License Headers
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Check license headers
        run: ./check-headers.sh

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scan
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      # The official TruffleHog action is SHA-pinned, which is more
      # supply-chain-safe than piping a remote install.sh into `sh`. The
      # action auto-detects base/head from the event context for both
      # push and pull_request events.
      - name: Scan with TruffleHog
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51  # v3.95.5
        with:
          extra_args: --only-verified

  helm-lint:
    runs-on: ubuntu-latest
    name: Helm Chart Lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # Keep this Helm version in sync with HELM_VERSION in
      # .github/workflows/docker-build-tag.yml so chart linting in CI uses
      # the same toolchain that publishes the chart at release time.
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.18.4

      - name: Lint Helm chart
        run: helm lint charts/lfx-changelog

      - name: Render Helm chart templates (smoke test)
        run: helm template release-name charts/lfx-changelog

  scripts-lint:
    runs-on: ubuntu-latest
    name: GitHub Scripts Lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 26

      # Node 25+ no longer bundles Corepack (nodejs/node#55488).
      - name: Enable Corepack
        run: npm install -g corepack && corepack enable

      # Yarn must be available before setup-node can configure the Yarn cache.
      - name: Configure Yarn cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 26
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint GitHub helper scripts
        run: yarn lint:scripts
